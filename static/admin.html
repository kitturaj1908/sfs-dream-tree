<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFS College Dream Tree - Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        /* Sidebar styling */
        .sidebar {
            padding: 30px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 11, 28, 0.8);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content {
            padding: 40px;
            overflow-y: auto;
            max-height: 100vh;
        }

        /* Login Modal overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 8, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 24px;
            text-align: center;
        }

        .stat-num {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 10px;
        }

        /* Activation Button widget */
        .activation-box {
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .activation-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .btn-active-toggle {
            width: 100%;
            padding: 14px;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* Message moderate row */
        .message-card {
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
        }

        .msg-text-box {
            flex-grow: 1;
        }

        .msg-sender {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .msg-body {
            color: #e2e8f0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .msg-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-icon {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-approve {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .btn-approve:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .config-group {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .toggle-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .toggle-switch input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .btn-danger-action {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            margin-top: 20px;
            width: 100%;
        }

        .btn-danger-action:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>

<body>

    <!-- Simple Login Protection -->
    <div id="login-modal" class="login-overlay">
        <div class="login-box glass-panel">
            <h2 class="text-neon-cyan" style="font-family: var(--font-serif); margin-bottom: 25px;">SFS College Admin
            </h2>
            <form onsubmit="loginAdmin(event)">
                <div class="form-group" style="text-align: left;">
                    <label for="admin-pass">Enter Admin Password</label>
                    <input type="password" id="admin-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="glow-btn" style="width: 100%; margin-top: 10px;">Login Dashboard</button>
            </form>
            <p id="login-error" style="color: var(--danger); font-size: 0.85rem; margin-top: 15px; display: none;">
                Invalid password, please try again.</p>
        </div>
    </div>

    <!-- Main Admin Layout -->
    <div class="admin-layout" id="admin-dashboard" style="display: none;">
        <!-- Left Sidebar Controls -->
        <div class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">SFS College</div>
            </a>

            <!-- Database Connection Panel -->
            <div class="glass-panel" style="padding: 16px 20px; font-size: 0.85rem; border: 1px solid rgba(255, 255, 255, 0.08); margin-top: 15px;">
                <div style="font-weight: 600; color: rgba(255, 255, 255, 0.8); display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <span id="db-status-dot" style="width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: var(--text-muted);"></span>
                    Database Status
                </div>
                <div id="db-host-label" style="word-break: break-all; color: var(--text-muted); line-height: 1.4;">Connecting...</div>
            </div>

            <div
                style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 20px;">
                Event Orchestration
            </div>

            <!-- Activation Panel -->
            <div class="activation-box glass-panel" id="activation-card">
                <div class="activation-status">Tree State: <span id="status-label"
                        class="text-neon-magenta">INACTIVE</span></div>
                <button id="activation-btn" onclick="toggleActivation()" class="glow-btn btn-active-toggle"
                    style="background: linear-gradient(135deg, var(--secondary), #7000ff);">
                    Activate Tree
                </button>
            </div>

            <!-- Configurations -->
            <div class="glass-panel" style="padding: 20px;">
                <h3 style="font-size: 1rem; margin-bottom: 15px;">Configuration</h3>

                <div class="toggle-switch">
                    <span>Auto-Approve Positive</span>
                    <input type="checkbox" id="auto-approve-chk" onchange="updateConfig()">
                </div>

                <div class="form-group" style="margin-bottom: 10px;">
                    <label for="activation-key-sel">Trigger Key</label>
                    <select id="activation-key-sel" onchange="updateConfig()"
                        style="width: 100%; padding: 8px; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;">
                        <option value="Space">Spacebar</option>
                        <option value="Enter">Enter</option>
                        <option value="A">Letter 'A'</option>
                    </select>
                </div>

                <button class="btn-icon btn-danger-action" onclick="resetDatabase()">Clear Database Data</button>
            </div>

            <div style="margin-top: auto; font-size: 0.75rem; text-align: center; color: var(--text-muted);">
                SFS College DEEKSHARAMBHA 2K26 &copy; 2026
            </div>
        </div>

        <!-- Right Main View -->
        <div class="main-content">
            <h1 class="text-neon-cyan"
                style="font-family: var(--font-serif); margin-bottom: 30px; font-size: 2.2rem; font-weight: 800;">
                Dream Tree Moderation
            </h1>

            <!-- Statistics Grid -->
            <div class="stats-grid">
                <div class="stat-card glass-panel">
                    <label>Total Submissions</label>
                    <div class="stat-num" id="stat-total" style="color: white;">0</div>
                </div>
                <div class="stat-card glass-panel">
                    <label>Approved (On Tree)</label>
                    <div class="stat-num" id="stat-approved" style="color: var(--accent);">0</div>
                </div>
                <div class="stat-card glass-panel">
                    <label>Pending Review</label>
                    <div class="stat-num" id="stat-pending" style="color: var(--warning);">0</div>
                </div>
                <div class="stat-card glass-panel">
                    <label>Auto-Blocked (Deleted)</label>
                    <div class="stat-num" id="stat-blocked" style="color: var(--danger);">0</div>
                </div>
            </div>

            <!-- Feed Stream -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.4rem; font-weight: 600;">Submissions Stream</h2>
                <button onclick="refreshData()" class="glow-btn"
                    style="padding: 6px 16px; font-size: 0.85rem; background: rgba(0,242,254,0.1); color: var(--primary); border: 1px solid rgba(0,242,254,0.2);">
                    Refresh Stream
                </button>
            </div>

            <div id="messages-list">
                <p style="color: var(--text-muted);">Loading submissions...</p>
            </div>
        </div>
    </div>

    <script>
        let adminToken = sessionStorage.getItem("admin_token") || "";
        let isActivated = false;

        if (adminToken) {
            showDashboard();
        }

        async function loginAdmin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById("admin-pass");
            const errLabel = document.getElementById("login-error");

            try {
                const response = await fetch("/api/admin/verify", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ password: passwordInput.value })
                });

                if (response.ok) {
                    const data = await response.json();
                    adminToken = data.token;
                    sessionStorage.setItem("admin_token", adminToken);
                    errLabel.style.display = "none";
                    showDashboard();
                } else {
                    errLabel.style.display = "block";
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed.");
            }
        }

        function showDashboard() {
            document.getElementById("login-modal").style.display = "none";
            document.getElementById("admin-dashboard").style.display = "grid";

            // Initial load
            refreshData();
            loadConfig();
            loadDbInfo();

            // Auto update every 3 seconds
            setInterval(refreshData, 3000);
        }

        async function loadDbInfo() {
            try {
                const response = await fetch("/api/db-info");
                if (response.ok) {
                    const data = await response.json();
                    const hostLabel = document.getElementById("db-host-label");
                    const statusDot = document.getElementById("db-status-dot");
                    if (data.is_tidb) {
                        hostLabel.innerHTML = `Connected to TiDB Cloud:<br><strong style="color: var(--primary); font-size: 0.8rem;">${data.host}</strong>`;
                        statusDot.style.backgroundColor = "var(--primary)";
                        statusDot.style.boxShadow = "0 0 8px var(--primary)";
                    } else if (data.is_postgres) {
                        hostLabel.innerHTML = `Connected to PostgreSQL:<br><strong style="color: var(--secondary); font-size: 0.8rem;">${data.host}</strong>`;
                        statusDot.style.backgroundColor = "var(--secondary)";
                        statusDot.style.boxShadow = "0 0 8px var(--secondary)";
                    } else {
                        hostLabel.innerHTML = `Connected to SQLite:<br><strong style="color: white; font-size: 0.8rem;">${data.host}</strong>`;
                        statusDot.style.backgroundColor = "var(--accent)";
                        statusDot.style.boxShadow = "0 0 8px var(--accent)";
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function refreshData() {
            if (!adminToken) return;
            await getStats();
            await getMessages();
            await getActivationState();
        }

        async function getStats() {
            try {
                const response = await fetch(`/api/admin/stats?token=${adminToken}`);
                if (response.status === 403) return logout();
                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById("stat-total").textContent = stats.total_submitted;
                    document.getElementById("stat-approved").textContent = stats.total_approved;
                    document.getElementById("stat-pending").textContent = stats.total_pending;
                    document.getElementById("stat-blocked").textContent = stats.total_blocked;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function getActivationState() {
            try {
                const response = await fetch("/api/status");
                if (response.ok) {
                    const data = await response.json();
                    isActivated = data.is_activated;

                    const label = document.getElementById("status-label");
                    const btn = document.getElementById("activation-btn");

                    if (isActivated) {
                        label.textContent = "ACTIVE";
                        label.className = "text-neon-cyan";
                        btn.textContent = "Deactivate Tree";
                        btn.style.background = "linear-gradient(135deg, var(--primary), #00a8ff)";
                    } else {
                        label.textContent = "INACTIVE";
                        label.className = "text-neon-magenta";
                        btn.textContent = "Activate Tree";
                        btn.style.background = "linear-gradient(135deg, var(--secondary), #7000ff)";
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function getMessages() {
            try {
                const response = await fetch(`/api/admin/messages?token=${adminToken}`);
                if (response.ok) {
                    const messages = await response.json();
                    const listContainer = document.getElementById("messages-list");

                    if (messages.length === 0) {
                        listContainer.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 40px;">No messages in the database yet.</p>`;
                        return;
                    }

                    let html = "";
                    messages.forEach(msg => {
                        let badgeClass = "badge-pending";
                        if (msg.status === "approved") {
                            badgeClass = "badge-approved";
                        } else if (msg.status === "blocked") {
                            badgeClass = "badge-rejected";
                        }
                        const showApprove = msg.status === "pending" || msg.status === "blocked";

                        html += `
                            <div class="message-card glass-panel animate-rise">
                                <div class="msg-text-box">
                                    <div class="msg-sender">
                                        <span>${escapeHtml(msg.student_name)}</span>
                                        <span class="badge ${badgeClass}">${msg.status}</span>
                                        <span class="badge badge-sentiment">${msg.sentiment}</span>
                                    </div>
                                    <div class="msg-body">"${escapeHtml(msg.message)}"</div>
                                    <div class="msg-time">${msg.created_at}</div>
                                </div>
                                <div class="msg-actions">
                                    ${showApprove ? `<button onclick="approveMessage(${msg.id})" class="btn-icon btn-approve">Approve</button>` : ''}
                                    <button onclick="deleteMessage(${msg.id})" class="btn-icon btn-delete">Delete</button>
                                </div>
                            </div>
                        `;
                    });

                    listContainer.innerHTML = html;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function approveMessage(msgId) {
            try {
                const response = await fetch(`/api/admin/approve/${msgId}?token=${adminToken}`, { method: "POST" });
                if (response.ok) refreshData();
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteMessage(msgId) {
            if (!confirm("Are you sure you want to permanently delete this message? It will be deleted from the database.")) return;
            try {
                const response = await fetch(`/api/admin/reject/${msgId}?token=${adminToken}`, { method: "DELETE" });
                if (response.ok) refreshData();
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleActivation() {
            try {
                const nextState = !isActivated;
                const response = await fetch(`/api/admin/toggle-activation?token=${adminToken}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ is_activated: nextState })
                });
                if (response.ok) {
                    getActivationState();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch("/api/status");
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("auto-approve-chk").checked = data.auto_approve;
                    document.getElementById("activation-key-sel").value = data.activation_key;
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function updateConfig() {
            const autoApprove = document.getElementById("auto-approve-chk").checked;
            const activationKey = document.getElementById("activation-key-sel").value;

            try {
                await fetch(`/api/admin/config?token=${adminToken}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        auto_approve_positive: autoApprove,
                        activation_key: activationKey
                    })
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function resetDatabase() {
            if (!confirm("CRITICAL WARNING: This will permanently delete ALL messages in the database and clear the display tree. Are you absolutely sure?")) return;
            if (!confirm("Confirming again: You are about to wipe the database. Do you wish to proceed?")) return;

            try {
                const response = await fetch(`/api/admin/config?token=${adminToken}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ clear_tree: true })
                });
                if (response.ok) {
                    alert("Database cleared successfully!");
                    refreshData();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            sessionStorage.removeItem("admin_token");
            window.location.reload();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>

</html>
