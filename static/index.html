<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFS College - Student Message Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-container {
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            margin-top: 40px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .portal-logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.5));
            border-radius: 50%;
        }


        .header-section h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .char-counter {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Success Card overlay */
        .success-overlay {
            display: none;
            text-align: center;
            padding: 20px 10px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            }

            50% {
                transform: scale(1.08);
                box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
            }
        }

        .success-overlay h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            font-family: var(--font-serif);
        }

        .success-overlay p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Ambient floating dots in background */
        .background-leaves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .leaf-particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.2), rgba(217, 70, 239, 0.2));
            border-radius: 50% 0 50% 50%;
            transform: rotate(45deg);
            animation: float-particle 10s linear infinite;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Background decorative elements -->
    <div class="background-leaves" id="particle-container"></div>

    <div class="portal-container glass-panel animate-rise">
        <!-- Message Submission Form -->
        <div id="form-container">
            <div class="header-section">
                <img src="/static/logo.png" class="portal-logo" alt="SFS College Logo">
                <h1 class="text-neon-cyan">SFS College (Autonomous) </h1>
                <p>Welcome, newcomers! Share your dreams, goals, or positive wishes for your journey at SFS.</p>
            </div>

            <form id="dream-form" onsubmit="submitDream(event)">
                <div class="form-group">
                    <label for="student-name">Your Name <span
                            style="font-size: 0.8rem; color: #64748b;">(Optional)</span></label>
                    <input type="text" id="student-name" maxlength="35" placeholder="e.g., Priya Sharma">
                </div>

                <div class="form-group">
                    <label for="student-message">Your Dream / Message *</label>
                    <textarea id="student-message" required maxlength="250"
                        placeholder="e.g., To learn, make amazing friends, and excel in technology!"></textarea>
                    <div class="char-counter"><span id="char-count">0</span> / 250</div>
                </div>

                <button type="submit" class="glow-btn submit-btn" id="submit-btn">
                    Send
                </button>
            </form>
        </div>

        <!-- Success Screen -->
        <div id="success-container" class="success-overlay">
            <div class="success-icon">✓</div>
            <h2 class="text-neon-magenta">Dream Sent!</h2>
            <p>Your wish has been registered.</p>
            <button onclick="resetForm()" class="glow-btn"
                style="padding: 10px 20px; font-size: 0.9rem; background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); color: white;">
                Submit Another Dream
            </button>
        </div>

        <!-- Watermark -->
        <div class="developer-watermark"
            style="text-align: center; margin-top: 45px; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid rgba(255, 255, 255, 0.06); padding-top: 15px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;">
            Developed by <span class="text-neon-cyan"
                style="font-weight: 600; text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);">KEERTHAN RAJA Y</span>
        </div>
    </div>


    <script>
        // Character counter
        const textarea = document.getElementById('student-message');
        const charCount = document.getElementById('char-count');
        textarea.addEventListener('input', () => {
            charCount.textContent = textarea.value.length;
        });

        // Background particles generator
        const container = document.getElementById('particle-container');
        const colors = [
            'rgba(0, 242, 254, 0.15)',
            'rgba(217, 70, 239, 0.15)',
            'rgba(16, 185, 129, 0.15)'
        ];

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('leaf-particle');

            const size = Math.random() * 15 + 10;
            const left = Math.random() * 100;
            const duration = Math.random() * 10 + 8;
            const delay = Math.random() * 5;
            const color = colors[Math.floor(Math.random() * colors.length)];

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${left}%`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${delay}s`;
            particle.style.background = color;

            container.appendChild(particle);

            // Remove after loop
            setTimeout(() => {
                particle.remove();
            }, (duration + delay) * 1000);
        }

        // Spawn initial particles
        for (let i = 0; i < 15; i++) {
            createParticle();
        }
        // Spawn interval
        setInterval(createParticle, 1200);

        // Submit to API
        async function submitDream(event) {
            event.preventDefault();

            const nameInput = document.getElementById('student-name');
            const messageInput = document.getElementById('student-message');
            const submitBtn = document.getElementById('submit-btn');

            const name = nameInput.value.trim();
            const message = messageInput.value.trim();

            if (!message) return;

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, message })
                });

                const data = await response.json();

                if (response.ok && (data.status === 'success' || data.status === 'filtered')) {
                    // Show success screen
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-container').style.display = 'block';

                    nameInput.value = '';
                    messageInput.value = '';
                    charCount.textContent = '0';

                } else {
                    alert(data.detail || "Error submitting message.");
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send";
                }
            } catch (err) {
                console.error(err);
                alert("Network error, please try again.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Send";
            }
        }

        function resetForm() {
            document.getElementById('success-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').textContent = "Send";
        }

    </script>
</body>

</html>
