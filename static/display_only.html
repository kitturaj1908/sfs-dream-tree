<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The SFS Dream Tree (Display Only)</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #070814;
            pointer-events: none !important;
            user-select: none !important;
            -webkit-user-select: none !important;
            cursor: none !important;
        }

        .display-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD Header UI */
        .hud-header {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            background: rgba(7, 8, 20, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 15px 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .hud-title {
            font-family: var(--font-serif);
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4e6ff, #ffcdd6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: text-glow-pulse 5s ease-in-out infinite;
        }

        @keyframes text-glow-pulse {

            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(178, 202, 250, 0.7)) drop-shadow(0 0 20px rgba(255, 172, 179, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 16px rgba(178, 202, 250, 1.0)) drop-shadow(0 0 36px rgba(255, 172, 179, 0.7));
            }
        }

        .hud-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 6px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 500;
            display: inline-block;
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.18);
            border-radius: 50px;
            padding: 6px 24px;
            animation: subtitle-shimmer 4s ease-in-out infinite;
        }

        @keyframes subtitle-shimmer {

            0%,
            100% {
                background: rgba(0, 242, 254, 0.08);
                border-color: rgba(0, 242, 254, 0.18);
            }

            50% {
                background: rgba(0, 242, 254, 0.14);
                border-color: rgba(0, 242, 254, 0.35);
                box-shadow: 0 0 16px rgba(0, 242, 254, 0.15);
            }
        }

        /* ══════════════════════════════════════
           LOGO SPLASH SCREEN (idle / waiting)
           ══════════════════════════════════════ */
        #logo-splash {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 1.2s ease;
            pointer-events: none !important;
            cursor: none !important;
        }

        #logo-splash::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 45%, rgba(10, 20, 55, 0.90) 0%, rgba(5, 6, 18, 0.99) 65%);
            z-index: 1;
            transition: opacity 2.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
        }

        #logo-splash.morphing::before {
            opacity: 0;
        }

        #logo-splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #logo-splash.morphing #anim-canvas {
            opacity: 0;
            transition: opacity 2.5s ease;
        }

        /* Ensure all content elements sit above the pseudo background */
        .logo-stage,
        .splash-college-name,
        .splash-event-name,
        .splash-cta {
            position: relative;
            z-index: 2;
        }

        /* ── 3-second countdown after chief guest presses the key ── */
        #logo-splash.morphing .splash-logo-img {
            animation: logo-morph-out 3s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }

        #logo-splash.morphing .ring-1 {
            animation: ring-activate 3s forwards !important;
            border-color: rgba(0, 242, 254, 1) !important;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.9), 0 0 100px rgba(0, 242, 254, 0.4) !important;
        }

        #logo-splash.morphing .ring-2 {
            animation: ring-activate 3s 0.2s forwards !important;
            border-color: rgba(217, 70, 239, 0.9) !important;
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.8) !important;
        }

        #logo-splash.morphing .ring-3 {
            animation: ring-activate 3s 0.4s forwards !important;
        }

        #logo-splash.morphing .splash-cta,
        #logo-splash.morphing .splash-college-name,
        #logo-splash.morphing .splash-event-name {
            animation: text-fade-out 1.2s forwards !important;
        }

        @keyframes logo-morph-out {
            0% {
                transform: translate(0, 0) scale(1);
                filter: drop-shadow(0 0 50px rgba(0, 242, 254, 0.85)) drop-shadow(0 0 110px rgba(217, 70, 239, 0.6));
            }

            30% {
                transform: translate(0, 0) scale(1.12);
                filter: drop-shadow(0 0 80px rgba(0, 242, 254, 1.0)) drop-shadow(0 0 160px rgba(217, 70, 239, 0.9));
            }

            60% {
                transform: translate(0, 0) scale(1.18);
                filter: drop-shadow(0 0 100px rgba(255, 255, 255, 1)) drop-shadow(0 0 200px rgba(0, 242, 254, 1));
            }

            80% {
                transform: translate(calc(var(--morph-x, 0px) * 0.8), calc(var(--morph-y, 20px) * 0.8)) scale(0.55);
                filter: drop-shadow(0 0 60px rgba(200, 160, 30, 1));
                border-radius: 50%;
            }

            95% {
                transform: translate(calc(var(--morph-x, 0px) * 0.95), calc(var(--morph-y, 20px) * 0.95)) scale(0.12);
                opacity: 0.6;
            }

            100% {
                transform: translate(var(--morph-x, 0px), var(--morph-y, 20px)) scale(0.04);
                opacity: 0;
            }
        }

        @keyframes ring-activate {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0.9;
            }

            75% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.4;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.2);
                opacity: 0;
            }
        }

        @keyframes text-fade-out {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* Full-screen animation canvas (rays, orbits, sweep) */
        #anim-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Single unified wrapper — logo lives INSIDE the rings */
        .logo-stage {
            position: relative;
            width: 620px;
            height: 620px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 20px;
            z-index: 2;
        }

        /* Glow disc backdrop that makes logo pop */
        .logo-stage::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 440px;
            height: 440px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 80, 130, 0.6) 0%, rgba(0, 40, 80, 0.25) 50%, transparent 72%);
            z-index: 1;
        }

        /* CSS rings positioned relative to .logo-stage center */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid transparent;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: ring-pulse 3.2s ease-in-out infinite;
        }

        .ring-1 {
            width: 380px;
            height: 380px;
            border-color: rgba(0, 242, 254, 0.7);
            box-shadow: 0 0 22px rgba(0, 242, 254, 0.25), inset 0 0 22px rgba(0, 242, 254, 0.1);
            animation-delay: 0s;
        }

        .ring-2 {
            width: 460px;
            height: 460px;
            border-color: rgba(217, 70, 239, 0.45);
            box-shadow: 0 0 16px rgba(217, 70, 239, 0.18), inset 0 0 16px rgba(217, 70, 239, 0.08);
            animation-delay: 0.75s;
        }

        .ring-3 {
            width: 550px;
            height: 550px;
            border-color: rgba(0, 242, 254, 0.22);
            animation-delay: 1.5s;
        }

        @keyframes ring-pulse {

            0%,
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.45;
                transform: translate(-50%, -50%) scale(1.03);
            }
        }

        /* Logo image — centered in .logo-stage */
        .splash-logo-img {
            width: 400px;
            height: 400px;
            object-fit: contain;
            border-radius: 50%;
            position: relative;
            z-index: 3;
            filter: drop-shadow(0 0 50px rgba(0, 242, 254, 0.85)) drop-shadow(0 0 110px rgba(217, 70, 239, 0.6));
            animation: logo-breathe 4.5s ease-in-out infinite;
        }

        @keyframes logo-breathe {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.75)) drop-shadow(0 0 70px rgba(217, 70, 239, 0.5));
            }

            50% {
                transform: scale(1.04);
                filter: drop-shadow(0 0 50px rgba(0, 242, 254, 1.0)) drop-shadow(0 0 100px rgba(217, 70, 239, 0.75));
            }
        }

        /* College name */
        .splash-college-name {
            font-family: var(--font-serif);
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-align: center;
            background: linear-gradient(135deg, #e8f4ff, #ffd6e0, #c8f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 8px;
            z-index: 2;
            animation: text-glow-pulse 4s ease-in-out infinite;
        }

        /* ═══════════════════════════════════════════════
           3D GOLD TITLE & PARTICLE SYSTEM OVERLAYS
           ═══════════════════════════════════════════════ */
        .splash-event-name {
            font-size: 2.4rem;
            letter-spacing: 9px;
            color: rgba(0, 242, 254, 0.9);
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 44px;
            text-shadow: 0 0 14px rgba(0, 242, 254, 0.7);
            padding: 5px 22px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 30px;
            background: rgba(0, 242, 254, 0.06);
            z-index: 2;
            animation: subtitle-shimmer 4s ease-in-out 0.5s infinite;
        }

        @keyframes subtitle-shimmer {
            0%, 100% {
                text-shadow: 0 0 14px rgba(0, 242, 254, 0.7);
                border-color: rgba(0, 242, 254, 0.3);
                background: rgba(0, 242, 254, 0.06);
            }
            50% {
                text-shadow: 0 0 24px rgba(0, 242, 254, 0.95), 0 0 10px rgba(0, 242, 254, 0.4);
                border-color: rgba(0, 242, 254, 0.65);
                background: rgba(0, 242, 254, 0.12);
            }
        }

        .gold-title-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.95)) drop-shadow(0 0 35px rgba(212, 175, 55, 0.25));
            overflow: visible;
        }

        /* Continuous subtle shimmer sweep animation on the splash screen title */
        .shimmer-text {
            background-size: 200% auto;
            animation: svgShineSweep 6s linear infinite;
        }

        @keyframes svgShineSweep {
            0% { stop-color: #ffd700; }
            30% { stop-color: #ffd700; }
            45% { stop-color: #fff; }
            50% { stop-color: #fff; }
            55% { stop-color: #ffd700; }
            100% { stop-color: #ffd700; }
        }

        /* Ended Gold Text Container */
        #ended-gold-text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        #ended-gold-text-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #ended-particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .ended-gold-title-wrapper {
            position: relative;
            width: 90%;
            max-width: 900px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9);
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #ended-gold-text-container.visible .ended-gold-title-wrapper {
            transform: scale(1);
        }

        /* Lens Flares / Sparkles styles */
        .lens-flares-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .lens-flare {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffffff 10%, rgba(255, 230, 100, 0.8) 30%, rgba(255, 200, 0, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            filter: drop-shadow(0 0 10px rgba(255, 220, 100, 0.9));
        }

        .lens-flare::before,
        .lens-flare::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.9) 50%, rgba(255, 255, 255, 0));
        }

        .lens-flare::before {
            width: 260px;
            height: 1.5px;
        }

        .lens-flare::after {
            width: 1.5px;
            height: 260px;
        }

        .lens-flare-diagonal {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(45deg);
        }

        .lens-flare-diagonal::before,
        .lens-flare-diagonal::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(to right, rgba(255, 240, 180, 0), rgba(255, 240, 180, 0.8) 50%, rgba(255, 240, 180, 0));
        }

        .lens-flare-diagonal::before {
            width: 160px;
            height: 1px;
        }

        .lens-flare-diagonal::after {
            width: 1px;
            height: 160px;
        }

        @keyframes flare-blink {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            30%, 70% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
        }

        @keyframes container-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -2px); }
            20% { transform: translate(3px, 2px); }
            30% { transform: translate(-3px, -1px); }
            40% { transform: translate(2px, 3px); }
            50% { transform: translate(-2px, -3px); }
            60% { transform: translate(3px, 1px); }
            70% { transform: translate(-1px, 2px); }
            80% { transform: translate(2px, -2px); }
            90% { transform: translate(-2px, 1px); }
            100% { transform: translate(0, 0); }
        }
        #ended-gold-text-container.shake {
            animation: container-shake 0.6s ease-in-out;
        }

        /* CTA */
        .splash-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }

        .splash-cta-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .splash-key-badge {
            display: inline-block;
            background: rgba(0, 242, 254, 0.07);
            border: 2px solid rgba(0, 242, 254, 0.5);
            color: rgba(0, 242, 254, 0.95);
            border-radius: 10px;
            padding: 11px 34px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: badge-pulse 2.4s ease-in-out infinite;
        }

        @keyframes badge-pulse {

            0%,
            100% {
                box-shadow: 0 0 18px rgba(0, 242, 254, 0.2);
                border-color: rgba(0, 242, 254, 0.5);
            }

            50% {
                box-shadow: 0 0 36px rgba(0, 242, 254, 0.65);
                border-color: rgba(0, 242, 254, 1.0);
            }
        }

        /* ══════════════════════════════════════
           TOP-LEFT WATERMARK (after activation)
           ══════════════════════════════════════ */
        #logo-watermark {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease 0.5s;
        }

        #logo-watermark.visible {
            opacity: 1;
        }

        .watermark-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5));
        }

        .watermark-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .watermark-text span:first-child {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
        }

        .watermark-text span:last-child {
            font-size: 0.68rem;
            color: rgba(0, 242, 254, 0.75);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sound button hidden as page is non-interactive */
        .sound-indicator {
            display: none !important;
        }
    </style>
</head>

<body>

    <div class="display-container">
        <!-- Main Canvas Drawing -->
        <canvas id="tree-canvas"></canvas>

        <!-- Top Header Overlay — hidden until tree activates -->
        <div class="hud-header" id="hud-header" style="opacity:0; pointer-events:none; transition: opacity 1.4s ease;">
            <h1 class="hud-title">The SFS Dream Tree</h1>
            <div class="hud-subtitle">SFS COLLEGE · DEEKSHARAMBHA 2K26</div>
        </div>

        <!-- Top-left watermark (appears after activation) -->
        <div id="logo-watermark">
            <img src="/static/logo.png?v=2" class="watermark-img" alt="SFS Logo">
            <div class="watermark-text">
                <span>St. Francis De Sales College (Autonomous)</span>
                <span>Deeksharambha 2K26</span>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════
             LOGO SPLASH — Idle / Waiting screen
             ═══════════════════════════════════════════════ -->
        <div id="logo-splash">
            <!-- Full-screen animation canvas: rays, orbits, sweep, particles -->
            <canvas id="anim-canvas"></canvas>

            <!-- Unified stage: logo + rings in one centered block -->
            <div class="logo-stage">
                <div class="ring ring-3"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <img src="/static/logo.png?v=2" class="splash-logo-img" alt="SFS College Logo">
            </div>

            <!-- College name & event -->
            <div class="splash-college-name">St. Francis De Sales College (Autonomous)</div>
            <div class="splash-event-name">Deeksharambha 2K26</div>

            <!-- Activation CTA -->
            <div class="splash-cta">
                <div class="splash-key-badge">WAITING FOR INAUGURATION</div>
            </div>
        </div>

        <!-- Ended Gold Text Overlay -->
        <div id="ended-gold-text-container" style="display: none;">
            <canvas id="ended-particles-canvas"></canvas>
            <div class="ended-gold-title-wrapper">
                <svg viewBox="0 0 1000 320" class="gold-title-svg" id="ended-gold-title-svg" style="opacity: 0;">
                    <defs>
                        <linearGradient id="goldGradEnded" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ffd700" />
                            <stop offset="25%" stop-color="#fff5cc" />
                            <stop offset="50%" stop-color="#b8860b" />
                            <stop offset="75%" stop-color="#ffd700" />
                            <stop offset="100%" stop-color="#8a640f" />
                        </linearGradient>
                        <path id="archPathEnded" d="M 100 220 A 700 700 0 0 1 900 220" />
                        <filter id="gold3dEnded">
                            <feOffset dx="0" dy="1" in="SourceAlpha" result="d1"/>
                            <feOffset dx="0" dy="2" in="SourceAlpha" result="d2"/>
                            <feOffset dx="0" dy="3" in="SourceAlpha" result="d3"/>
                            <feOffset dx="0" dy="4" in="SourceAlpha" result="d4"/>
                            <feOffset dx="0" dy="5" in="SourceAlpha" opacity="0.8" result="d5"/>
                            <feMerge result="3d">
                                <feMergeNode in="d1"/><feMergeNode in="d2"/>
                                <feMergeNode in="d3"/><feMergeNode in="d4"/>
                                <feMergeNode in="d5"/>
                            </feMerge>
                            <feFlood flood-color="#4a3000" result="floodColor"/>
                            <feComposite in="floodColor" in2="3d" operator="in" result="extrusion"/>
                            <feOffset dx="0" dy="8" in="SourceAlpha" result="shadowOffset"/>
                            <feGaussianBlur in="shadowOffset" stdDeviation="5" result="shadowBlur"/>
                            <feMerge>
                                <feMergeNode in="shadowBlur"/>
                                <feMergeNode in="extrusion"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    <text filter="url(#gold3dEnded)" fill="url(#goldGradEnded)" font-family="'Cinzel', serif" font-weight="900" font-size="76" letter-spacing="4px" text-anchor="middle">
                        <textPath href="#archPathEnded" startOffset="50%">DEEKSHARAMBHA</textPath>
                    </text>
                    <text x="500" y="295" filter="url(#gold3dEnded)" fill="url(#goldGradEnded)" font-family="'Cinzel', serif" font-weight="900" font-size="92" letter-spacing="8px" text-anchor="middle">2K26</text>
                </svg>
                <div class="lens-flares-container" id="lens-flares"></div>
            </div>
        </div>

        <!-- Developer Watermark -->
        <div class="dev-watermark" style="position: absolute; bottom: 20px; left: 20px; z-index: 25; font-size: 0.72rem; color: rgba(255, 255, 255, 0.35); letter-spacing: 1px; text-transform: uppercase; font-family: 'Outfit', sans-serif; pointer-events: none; opacity: 0.8;">
            Developed by <span style="color: #00f2fe; font-weight: 600; text-shadow: 0 0 8px rgba(0, 242, 254, 0.4);">KEERTHAN RAJA Y</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/tree_only.js?v=2"></script>
    <script>
        let soundMuted = false;

        /* ══════════════════════════════════════════════════════════
           RICH ANIMATION ENGINE — rays, orbits, sweep, particles
           ══════════════════════════════════════════════════════════ */
        (function initAnimCanvas() {
            const canvas = document.getElementById('anim-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, cx, cy, t = 0;

            /* Background drifting stars */
            const stars = Array.from({ length: 120 }, () => ({
                x: Math.random(), y: Math.random(),
                r: Math.random() * 1.6 + 0.3,
                a: Math.random() * 0.8 + 0.1,
                spd: (Math.random() - 0.5) * 0.00015
            }));

            /* Orbiting glowing particles at 3 orbit radii */
            const orbiters = [
                ...Array.from({ length: 10 }, (_, i) => ({ angle: (i / 10) * Math.PI * 2, r: 200, spd: 0.008, size: 4, col: [0, 242, 254] })),
                ...Array.from({ length: 14 }, (_, i) => ({ angle: (i / 14) * Math.PI * 2, r: 252, spd: -0.006, size: 3, col: [217, 70, 239] })),
                ...Array.from({ length: 8 }, (_, i) => ({ angle: (i / 8) * Math.PI * 2, r: 300, spd: 0.004, size: 2.5, col: [16, 185, 129] })),
            ];

            /* Sparkle burst particles */
            const sparks = Array.from({ length: 50 }, () => makeSpark());
            function makeSpark() {
                const ring = [200, 252, 300][Math.floor(Math.random() * 3)];
                const a = Math.random() * Math.PI * 2;
                return {
                    x: Math.cos(a) * ring, y: Math.sin(a) * ring,
                    vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2 - 0.4,
                    life: 1.0, decay: 0.008 + Math.random() * 0.012,
                    r: Math.random() * 2 + 0.5,
                    col: [[0, 242, 254], [217, 70, 239], [16, 185, 129]][Math.floor(Math.random() * 3)]
                };
            }



            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
                cx = W / 2; cy = H / 2;
            }
            resize();
            window.addEventListener('resize', resize);

            function draw() {
                const splash = document.getElementById('logo-splash');
                if (!splash || splash.classList.contains('hidden')) return;

                ctx.clearRect(0, 0, W, H);
                t += 0.016;

                /* 1 ─ Drifting background stars */
                stars.forEach(s => {
                    s.a += s.spd;
                    if (s.a <= 0.05 || s.a >= 0.9) s.spd *= -1;
                    ctx.beginPath();
                    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180,220,255,${s.a})`;
                    ctx.fill();
                });

                /* 2 ─ Rotating light rays */
                ctx.save();
                ctx.translate(cx, cy);
                const numRays = 18;
                for (let i = 0; i < numRays; i++) {
                    const angle = (i / numRays) * Math.PI * 2 + t * 0.18;
                    const rayLen = 300 + Math.sin(t * 1.3 + i) * 40;
                    const alpha = 0.04 + Math.sin(t * 0.9 + i * 0.7) * 0.02;
                    const grad = ctx.createLinearGradient(0, 0, Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    grad.addColorStop(0, `rgba(0,242,254,${alpha * 4})`);
                    grad.addColorStop(0.4, `rgba(0,200,240,${alpha})`);
                    grad.addColorStop(1, `rgba(0,100,180,0)`);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = grad;
                    ctx.stroke();
                }
                /* Counter-rotating rays */
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2 - t * 0.12;
                    const rayLen = 220 + Math.sin(t * 1.7 + i * 1.2) * 30;
                    const alpha = 0.03 + Math.sin(t + i) * 0.015;
                    const grad2 = ctx.createLinearGradient(0, 0, Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    grad2.addColorStop(0, `rgba(217,70,239,${alpha * 3})`);
                    grad2.addColorStop(0.5, `rgba(180,40,200,${alpha})`);
                    grad2.addColorStop(1, 'rgba(100,0,150,0)');
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle) * rayLen, Math.sin(angle) * rayLen);
                    ctx.lineWidth = 1.8;
                    ctx.strokeStyle = grad2;
                    ctx.stroke();
                }
                ctx.restore();

                /* 4 ─ Orbiting particles */
                ctx.save();
                ctx.translate(cx, cy);
                orbiters.forEach(o => {
                    o.angle += o.spd;
                    const px = Math.cos(o.angle) * o.r;
                    const py = Math.sin(o.angle) * o.r;
                    const pulse = 0.7 + 0.3 * Math.sin(t * 3 + o.angle);
                    ctx.beginPath();
                    ctx.arc(px, py, o.size * pulse, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${o.col[0]},${o.col[1]},${o.col[2]},${0.85 * pulse})`;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = `rgba(${o.col[0]},${o.col[1]},${o.col[2]},0.8)`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
                ctx.restore();

                /* 5 ─ Spark burst particles */
                ctx.save();
                ctx.translate(cx, cy);
                for (let i = sparks.length - 1; i >= 0; i--) {
                    const s = sparks[i];
                    s.x += s.vx; s.y += s.vy;
                    s.vy -= 0.012;
                    s.life -= s.decay;
                    if (s.life <= 0) { sparks[i] = makeSpark(); continue; }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life * 0.9})`;
                    ctx.fill();
                }
                ctx.restore();



                requestAnimationFrame(draw);
            }
            draw();
        })();

        async function fetchCTAConfig() {
            try {
                const response = await fetch("/api/status");
                if (response.ok) {
                    const data = await response.json();
                    if (data.is_activated) hideSplash();
                }
            } catch (err) { console.error("CTA loading error:", err); }
        }

        /* ── Polling only auto-hides if activated ── */
        setInterval(async () => {
            try {
                const response = await fetch("/api/status");
                if (response.ok) {
                    const data = await response.json();
                    if (data.is_activated && tree && !tree.isActivated) {
                        // activated on server
                    }
                }
            } catch (err) { }
        }, 4000);

        function hideSplash() {
            const splash = document.getElementById("logo-splash");
            if (splash && !splash.classList.contains('hidden')) {
                splash.classList.add('hidden');
            }
        }

        function showSplash() {
            const splash = document.getElementById("logo-splash");
            const activeStages = ['logo_active', 'seed', 'seedling', 'seedling_wait', 'growing', 'title', 'raining'];
            if (splash && splash.classList.contains('hidden') && window.tree && !activeStages.includes(window.tree.activationStage)) {
                splash.classList.remove('hidden');
            }
        }

        function hidePrompt() { hideSplash(); }
        function showPrompt() { }

        function activateTitle() {
            const hud = document.getElementById('hud-header');
            if (hud) hud.style.opacity = '1';

            const wm = document.getElementById('logo-watermark');
            if (wm) wm.classList.add('visible');
        }

        window.addEventListener("load", () => {
            fetchCTAConfig();
        });

        /* ══════════════════════════════════════════════════════════
           GOLD TEXT ANIMATION CONTROLLER (3D Title, flares, embers)
           ══════════════════════════════════════════════════════════ */
        let endedAnimationStarted = false;
        let endedCanvas, endedCtx;
        let endedParticles = [];
        let endedAnimationId;
        let endedPhase = 0; // 0: inactive, 1: fade-in, 2: shine-sweep, 3: explosion, 4: dissolve, 5: loop-delay
        let endedPhaseTimer = 0;

        window.triggerGoldTextAnimation = function() {
            if (endedAnimationStarted) return;
            endedAnimationStarted = true;
            endedPhase = 1;
            endedPhaseTimer = 0;
            
            const container = document.getElementById('ended-gold-text-container');
            if (container) {
                container.style.display = 'flex';
                container.offsetHeight; // force reflow
                container.classList.add('visible');
            }
            
            initEndedParticles();
            runEndedAnimationLoop();
        };

        window.resetGoldTextAnimation = function() {
            endedAnimationStarted = false;
            endedPhase = 0;
            if (endedAnimationId) cancelAnimationFrame(endedAnimationId);
            const container = document.getElementById('ended-gold-text-container');
            if (container) {
                container.classList.remove('visible');
                setTimeout(() => {
                    if (!endedAnimationStarted) container.style.display = 'none';
                }, 1500);
            }
            endedParticles = [];
        };

        function initEndedParticles() {
            endedCanvas = document.getElementById('ended-particles-canvas');
            if (!endedCanvas) return;
            endedCtx = endedCanvas.getContext('2d');
            resizeEndedCanvas();
            window.addEventListener('resize', resizeEndedCanvas);
        }

        function resizeEndedCanvas() {
            if (!endedCanvas) return;
            endedCanvas.width = window.innerWidth;
            endedCanvas.height = window.innerHeight;
        }

        class EndedParticle {
            constructor(x, y, isExplosion = false, isDissolve = false) {
                this.x = x;
                this.y = y;
                this.isDissolve = isDissolve;
                
                const angle = isExplosion 
                    ? Math.random() * Math.PI * 2 
                    : -Math.PI / 2 + (Math.random() - 0.5) * 1.5;
                
                const speed = isExplosion
                    ? Math.random() * 8 + 3
                    : Math.random() * 2 + 1;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - (isExplosion ? 2 : 1);
                
                this.size = Math.random() * (isExplosion ? 4.5 : 2.5) + 1.2;
                this.alpha = 1.0;
                this.life = 1.0;
                this.decay = Math.random() * 0.012 + 0.006;
                this.gravity = 0.04;
                this.wind = (Math.random() - 0.5) * 0.05;
                
                const colors = [
                    'rgba(255, 215, 0, ',   // Gold
                    'rgba(255, 120, 0, ',   // Orange
                    'rgba(255, 65, 0, ',    // Red-Orange
                    'rgba(255, 240, 180, '  // Bright Yellow
                ];
                this.colorPrefix = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx += this.wind;
                this.alpha -= this.decay;
                if (this.alpha < 0) this.alpha = 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.colorPrefix + this.alpha + ')';
                
                if (this.size > 2.5) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(255, 100, 0, 0.8)';
                }
                ctx.fill();
                ctx.restore();
            }
        }

        function runEndedAnimationLoop() {
            if (!endedAnimationStarted || !endedCanvas || !endedCtx) return;
            
            endedCtx.fillStyle = 'rgba(7, 8, 20, 0.25)';
            endedCtx.fillRect(0, 0, endedCanvas.width, endedCanvas.height);
            
            endedPhaseTimer++;
            
            const titleSvg = document.getElementById('ended-gold-title-svg');
            
            if (endedPhase === 1) {
                if (titleSvg) {
                    titleSvg.style.opacity = endedPhaseTimer / 90;
                    titleSvg.style.filter = `drop-shadow(0 15px 25px rgba(0,0,0,0.95)) drop-shadow(0 0 ${20 + (endedPhaseTimer/90)*25}px rgba(212,175,55,0.4))`;
                }
                
                if (Math.random() < 0.2) {
                    const rx = endedCanvas.width / 2 + (Math.random() - 0.5) * 600;
                    const ry = endedCanvas.height / 2 + 100;
                    endedParticles.push(new EndedParticle(rx, ry));
                }
                
                if (endedPhaseTimer >= 90) {
                    endedPhase = 2;
                    endedPhaseTimer = 0;
                }
            } 
            else if (endedPhase === 2) {
                if (titleSvg) {
                    titleSvg.style.opacity = 1;
                }
                
                if (endedPhaseTimer === 10 || endedPhaseTimer === 40 || endedPhaseTimer === 70 || endedPhaseTimer === 100) {
                    const rect = titleSvg.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const w = rect.width;
                    const h = rect.height;
                    
                    if (endedPhaseTimer === 10) triggerLensFlare(cx - w * 0.25, cy - h * 0.2);
                    if (endedPhaseTimer === 40) triggerLensFlare(cx, cy - h * 0.35);
                    if (endedPhaseTimer === 70) triggerLensFlare(cx + w * 0.25, cy - h * 0.2);
                    if (endedPhaseTimer === 100) triggerLensFlare(cx, cy + h * 0.25);
                }
                
                if (Math.random() < 0.3) {
                    const rx = endedCanvas.width / 2 + (Math.random() - 0.5) * 600;
                    const ry = endedCanvas.height / 2 + (Math.random() - 0.5) * 200;
                    endedParticles.push(new EndedParticle(rx, ry));
                }
                
                if (endedPhaseTimer >= 150) {
                    endedPhase = 3;
                    endedPhaseTimer = 0;
                }
            } 
            else if (endedPhase === 3) {
                if (endedPhaseTimer === 1) {
                    const container = document.getElementById('ended-gold-text-container');
                    if (container) {
                        container.classList.add('shake');
                        setTimeout(() => container.classList.remove('shake'), 600);
                    }
                    
                    const numSparks = 200;
                    const rect = titleSvg.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const w = rect.width;
                    const h = rect.height;
                    for (let i = 0; i < numSparks; i++) {
                        const rx = cx + (Math.random() - 0.5) * w;
                        const ry = cy + (Math.random() - 0.5) * h;
                        endedParticles.push(new EndedParticle(rx, ry, true));
                    }
                }
                
                if (Math.random() < 0.8) {
                    const rect = titleSvg.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const rx = cx + (Math.random() - 0.5) * rect.width;
                    const ry = cy + (Math.random() - 0.5) * rect.height;
                    endedParticles.push(new EndedParticle(rx, ry, false));
                }
                
                if (endedPhaseTimer >= 120) {
                    endedPhase = 4;
                    endedPhaseTimer = 0;
                }
            } 
            else if (endedPhase === 4) {
                const progress = endedPhaseTimer / 120;
                if (titleSvg) {
                    titleSvg.style.opacity = 1 - progress;
                    titleSvg.style.transform = `scale(${1 - progress * 0.05}) translateY(${-progress * 15}px)`;
                }
                
                const rect = titleSvg.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const rx = cx + (Math.random() - 0.5) * rect.width;
                const ry = cy + (Math.random() - 0.5) * rect.height - progress * 15;
                endedParticles.push(new EndedParticle(rx, ry, false, true));
                if (Math.random() < 0.5) {
                    endedParticles.push(new EndedParticle(rx, ry, false, true));
                }
                
                if (endedPhaseTimer >= 120) {
                    endedPhase = 5;
                    endedPhaseTimer = 0;
                }
            } 
            else if (endedPhase === 5) {
                if (titleSvg) {
                    titleSvg.style.opacity = 0;
                    titleSvg.style.transform = 'scale(1) translateY(0)';
                }
                
                if (endedPhaseTimer >= 150) {
                    endedPhase = 1;
                    endedPhaseTimer = 0;
                }
            }
            
            endedParticles = endedParticles.filter(p => p.alpha > 0);
            endedParticles.forEach(p => {
                p.update();
                p.draw(endedCtx);
            });
            
            endedAnimationId = requestAnimationFrame(runEndedAnimationLoop);
        }

        function triggerLensFlare(x, y) {
            const container = document.getElementById('lens-flares');
            if (!container) return;
            
            const flare = document.createElement('div');
            flare.className = 'lens-flare';
            flare.style.left = `${x}px`;
            flare.style.top = `${y}px`;
            
            const diagonal = document.createElement('div');
            diagonal.className = 'lens-flare-diagonal';
            flare.appendChild(diagonal);
            
            container.appendChild(flare);
            flare.style.animation = 'flare-blink 0.8s ease-out forwards';
            
            setTimeout(() => {
                flare.remove();
            }, 800);
        }
    </script>
